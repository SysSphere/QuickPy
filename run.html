<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPy</title>
    <style>
        .CodeMirror {
            text-align: left;
            border-radius: 10px;
        }
    </style>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
</head>

<body>

    <header>
        <span id="menu"><i class="fas fa-bars"></i></span>
        <p>QuickPy</p>
        <div>
            <span id="toggleBtn"><i class="fas fa-adjust"></i></span>
            <span id="streak"><i class="fas fa-fire"></i> 0</span>
        </div>
    </header>

    <!-- Side Menu -->
    <div id="sideMenu">
        <div class="sideMenuHeader">
            <span class="menu-title">Menu</span>
            <button id="closeMenuBtn" class="sideMenuItem">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <a href="index.html" class="sideMenuItem">
            <i class="fas fa-home"></i> Home
        </a>
        <a href="about.html" class="sideMenuItem">
            <i class="fas fa-info-circle"></i> About
        </a>
        <a href="search.html" class="sideMenuItem">
            <i class="fas fa-search"></i> Search scripts
        </a>
        <a href="learn.html" class="sideMenuItem">
            <i class="fas fa-book"></i> Learn Python
        </a>
        <a href="quiz.html" class="sideMenuItem">
            <i class="fas fa-question-circle"></i> Python quiz
        </a>
        <a href="run.html" class="sideMenuItem">
            <i class="fas fa-play-circle"></i> Run Python
        </a>
        <a href="favorites.html" class="sideMenuItem">
            <i class="fas fa-heart"></i> Favorites
        </a>
    </div>

    <!-- Hero Section -->
    <div class="container">
        <h1>Run any Python code for free in the browser!</h1>
    </div>

    <!-- Run Section -->
    <div class="run fade-in-element" id="quizPage">
        <h1 class="line-text">Run Python: </h1>

        <textarea placeholder="Enter your code..." id="codeArea"></textarea><br /><br />

        <button onclick="runCode(codeEditor.getValue())" style="background-color: red; color: white;">Run <i
                class="fas fa-play-circle"></i> </button>
    </div>

    <!-- Invitation Section -->
    <div class="inv fade-in-element">
        <h1>Are you ready to learn Python?</h1>
        <p>
            Click here to get a free interactive course to learn the bascics of Python now.
        </p>
        <button onclick="window.location.href='learn.html'"><i class="fas fa-book"></i> Learn</button>
    </div>

    <!-- Footer -->
    <footer>
        <p>QuickPy</p>
        <div class="right-icons">
            <a href="#" class="icon" style="color:white;"><i class="fa-brands fa-square-facebook"></i></a>
            <a href="#" class="icon" style="color:orange;"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="icon" style="color:aqua;"><i class="fa-brands fa-twitter"></i></a>
            <a href="#" class="icon" style="color:white;"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </footer>

    <script src="js/menu.js"></script>
    <script src="js/fadeIn.js"></script>
    <script src="js/themeToggle.js"></script>
    <script src="js/run.js"></script>
    <script src="js/streak.js"></script>
    <script src="js/streak.js"></script>

</body>

</html>
